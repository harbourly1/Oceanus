services:
  postgres:
    image: postgres:16-alpine
    container_name: oceanus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oceanus
      POSTGRES_PASSWORD: oceanus_dev_2025
      POSTGRES_DB: oceanus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oceanus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oceanus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oceanus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: oceanus_minio
      MINIO_ROOT_PASSWORD: oceanus_minio_2025
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
